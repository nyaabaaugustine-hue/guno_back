services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: juno_tax_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/juno_tax_saas
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-in-production-generate-with-openssl-rand
      SSN_ENCRYPTION_KEY: change-in-production-generate-with-openssl-rand
    depends_on:
      - db

volumes:
  pgdata:
