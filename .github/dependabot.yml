version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      nextjs:
        patterns:
          - "next"
          - "next-auth"
          - "@next/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
          - "@typescript-eslint/*"
      drizzle:
        patterns:
          - "drizzle-orm"
          - "drizzle-kit"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
